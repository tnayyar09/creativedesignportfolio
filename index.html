<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreativeHub - Creative Design Portfolio</title>
    <meta name="description" content="Explore stunning creative designs - logos, social media, print, UI/UX and more">
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎨%3C/text%3E%3C/svg%3E">
</head>
<body>

    <!-- Page Loader -->
    <div class="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <div class="brand-icon">🎨</div>
            <span>CreativeHub</span>
        </a>

        <ul class="nav-menu" id="navMenu">
            <!-- Built dynamically by JS from config.js -->
        </ul>

        <button class="hamburger" id="hamburger" aria-label="Toggle Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to Our Creative Portfolio</h1>
            <p>Explore stunning designs crafted with passion and precision. Browse through our collection of creative work.</p>
        </div>
    </section>

    <!-- Gallery Grid -->
    <section class="gallery-section">
        <div class="gallery-grid" id="galleryGrid" data-category="home">
            <!-- Images loaded dynamically from config.js -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2025 CreativeHub. All creative designs are property of their respective owners.</p>
    </footer>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/lightbox.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
